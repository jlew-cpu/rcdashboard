// ── Primitives ─────────────────────────────────────────────────────────────
const chip = (text, color, bg, style={}) => (
  <span style={{display:'inline-flex',alignItems:'center',padding:'2px 8px',borderRadius:999,border:`1px solid ${color}`,background:bg||'transparent',color,fontSize:11,fontWeight:500,whiteSpace:'nowrap',...style}}>{text}</span>
);

const hr = (m='10px 0') => <div style={{height:1,background:C.border,margin:m}}/>;

function Avatar({initials, size=28, kind='recruiter'}) {
  return <div style={{width:size,height:size,borderRadius:'50%',background:kind==='recruiter'?C.clayBg:C.oliveBg,border:`1.5px solid ${kind==='recruiter'?C.clay:C.olive}`,color:kind==='recruiter'?C.clay:C.olive,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:size*.38,fontWeight:700,flexShrink:0}}>{initials}</div>;
}

function Sparkline({values, color}) {
  const W=72,H=18,max=Math.max(...values,1);
  const pts=values.map((v,i)=>`${((i/(values.length-1))*W).toFixed(1)},${(H-2-(v/max)*(H-4)).toFixed(1)}`).join(' ');
  return <svg width={W} height={H}><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>;
}

function Card({children, style={}, warnLeft=false}) {
  return <div style={{background:C.surface,border:`1px solid ${warnLeft?C.clayLight:C.border}`,borderLeft:warnLeft?`3px solid ${C.clay}`:undefined,borderRadius:12,padding:'14px 16px',...style}}>{children}</div>;
}

function SecTitle({children, sub, warn=false, right}) {

        {sub && <span style={{fontSize:12,color:C.muted}}>{sub}</span>}
      </div>
      {right}
    </div>
  );
}

          <div style={{display:'flex',alignItems:'baseline',gap:6}}>
            <span style={{fontSize:32,fontWeight:700,color:k.warn?C.clay:C.slate,letterSpacing:'-0.03em',lineHeight:1}}>{k.value}</span>

// ── Section 3: Daily feed ──────────────────────────────────────────────────
const FILTERS = ['today','+ yesterday','after-hours only','declines only','urgent only'];

function FeedItem({item, srcColor}) {
  return (
    <div style={{borderRadius:6,border:`1px solid ${item.urgent?C.clayLight:C.border}`,borderLeft:`3px solid ${item.urgent?C.clay:srcColor}`,background:item.urgent?C.clayBgSoft:C.surface,padding:'8px 10px',marginBottom:6}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:6}}>
        <span style={{fontSize:12,fontWeight:600,color:C.slate}}>
          {item.from}
          {item.ctx && <span style={{color:C.muted,fontWeight:400}}> · {item.ctx}</span>}
        </span>
        <span style={{fontSize:11,color:C.faint,whiteSpace:'nowrap',flexShrink:0}}>{item.time}</span>
      </div>
      <p style={{margin:'3px 0 0',fontSize:12,color:C.slate,lineHeight:1.4}}>{item.text}</p>
      <div style={{display:'flex',gap:4,marginTop:6,flexWrap:'wrap'}}>
        {item.decline  && chip('decline',      C.clay,  C.clayBg)}
        {item.afterHrs && chip('after hrs',    C.muted, C.alt)}
        {item.urgent   && chip('action needed',C.clay,  C.clayBg)}
        {item.ctx === 'DM' || item.ctx?.startsWith('#') ? chip('open thread', C.faint, C.alt) : null}
      </div>
    </div>
  );
}

function FeedCol({src}) {
  const d = FEED[src];
  const urgent = d.items.filter(i=>i.urgent).length;
  return (
    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:14}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:30,height:30,borderRadius:'50%',background:d.bg,border:`1.5px solid ${d.border}`,color:d.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}}>{d.short}</div>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:C.slate}}>{d.label}</div>
            <div style={{fontSize:11,color:C.faint}}>{d.sub}</div>
          </div>
        </div>
        {urgent>0 && chip(`${urgent} urgent`, C.clay, C.clayBg)}
      </div>
      {hr('0 0 10px')}
      {d.items.map((item,i) => <FeedItem key={i} item={item} srcColor={d.color}/>)}
    </div>
  );
}

function PersonCard({p}) {
  const isRec = p.kind==='recruiter';
  const accent = isRec?C.clay:C.olive;
  const accentBorder = isRec?C.clayLight:`${C.oliveLight}90`;
  return (
    <div style={{background:C.surface,border:`1px solid ${accentBorder}`,borderTop:`3px solid ${accent}`,borderRadius:12,padding:12}}>
      <div style={{display:'flex',alignItems:'flex-start',gap:8,marginBottom:8}}>
        <Avatar initials={p.initials} size={30} kind={p.kind}/>
        <div>
          <div style={{fontSize:13,fontWeight:600,color:C.slate}}>{p.name}</div>
          <div style={{fontSize:10,color:C.muted,marginTop:1}}>{p.kind} · {p.focus}</div>
        </div>
      </div>
      {hr('0 0 8px')}
      {p.people.map((c,i)=>{
        const s = STAGE[c.stage]||STAGE.Outreach;
        return (
          <div key={i} style={{padding:'5px 0',borderBottom:i<p.people.length-1?`1px dashed ${C.border}`:'none'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',gap:4}}>
              <span style={{fontSize:12,fontWeight:600,color:C.slate}}>{c.name}</span>
              <span style={{fontSize:10,fontWeight:600,color:s.color,background:s.bg,padding:'1px 5px',borderRadius:4,flexShrink:0}}>{c.stage}</span>
            </div>
            <div style={{fontSize:10,color:C.muted,margin:'2px 0 4px',lineHeight:1.3}}>{c.role}</div>
            <div style={{display:'flex',gap:4}}>
              {chip('ML',C.clay,C.clayBg,{fontSize:10,padding:'1px 6px',cursor:'pointer'})}
              {chip('GH',C.olive,C.oliveBg,{fontSize:10,padding:'1px 6px',cursor:'pointer'})}
              {chip('IG',C.muted,C.alt,{fontSize:10,padding:'1px 6px',cursor:'pointer'})}
            </div>
          </div>
        );
      })}
    </div>
  );
}

        <div style={{display:'flex',flexWrap:'wrap',gap:8,alignItems:'center'}}>
          {['HM','TS','CD','SD','CL'].map(k=>(
            <span key={k} style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:11,color:C.muted}}>
              <span style={{width:8,height:8,borderRadius:2,background:KIND_COLOR[k],flexShrink:0}}/>
              {KIND_NAME[k]}
            </span>
          ))}
        </div>
      </div>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,overflow:'hidden'}}>
        <div style={{display:'grid',gridTemplateColumns:'160px 64px 96px 1fr 80px',gap:12,padding:'8px 16px',background:C.alt,borderBottom:`1px solid ${C.border}`,fontSize:11,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:'0.03em'}}>
          <span>Interviewer</span>
          <span style={{textAlign:'right'}}>This wk</span>
          <span style={{textAlign:'right'}}>Hrs / cap</span>
          <span>Kind breakdown</span>
          <span style={{textAlign:'right'}}>Done/sched</span>
        </div>
        {INTERVIEWERS.map((iv,i)=>{
          const over = iv.hours>iv.cap;
          const total = Object.values(iv.kinds).reduce((a,b)=>a+b,0);
          return (
            <div key={iv.name} style={{display:'grid',gridTemplateColumns:'160px 64px 96px 1fr 80px',gap:12,padding:'10px 16px',alignItems:'center',borderBottom:i<INTERVIEWERS.length-1?`1px solid ${C.border}`:'none'}}>
              <span style={{fontSize:13,fontWeight:500,color:C.slate}}>{iv.name}</span>
              <span style={{textAlign:'right',fontSize:16,fontWeight:700,color:C.slate}}>{total}</span>
              <div style={{textAlign:'right'}}>
                <span style={{fontSize:15,fontWeight:700,color:over?C.red:C.slate}}>{iv.hours}h</span>
                <span style={{fontSize:11,color:C.muted}}>/{iv.cap}</span>
                {over&&<span style={{marginLeft:4,fontSize:10,color:C.red,fontWeight:600}}>over</span>}
              </div>
              <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                {Object.entries(iv.kinds).map(([k,v])=>(
                  <span key={k} style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 7px',borderRadius:4,background:KIND_BG[k],border:`1px solid ${KIND_COLOR[k]}30`,fontSize:11,color:C.slate,fontWeight:500}}>
                    {KIND_NAME[k]} <b style={{color:KIND_COLOR[k]}}>{v}</b>
                  </span>
                ))}
              </div>
              <span style={{textAlign:'right',fontSize:12,color:C.muted}}><b style={{color:C.slate}}>{iv.done}</b>/{iv.sched}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Section 6a: Decline offenders ─────────────────────────────────────────
function DeclineSection() {
  return (
    <div>
      <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:12}}>
        <div style={{display:'flex',alignItems:'baseline',gap:8}}>
          <h2 style={{margin:0,fontSize:15,fontWeight:600,color:C.clay}}>Decline offenders</h2>
          <span style={{fontSize:12,color:C.muted}}>interviews you scheduled that they bailed on</span>
        </div>
        {chip('last 30d · >25% rate', C.muted, C.alt)}
      </div>
      {DECLINES.map((d,i)=>(
        <div key={i} style={{background:C.clayBgSoft,border:`1px solid ${C.clayLight}`,borderLeft:`3px solid ${C.clay}`,borderRadius:12,padding:'12px 14px',marginBottom:i<DECLINES.length-1?10:0}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,marginBottom:4}}>
            <div style={{display:'flex',alignItems:'baseline',gap:8,flexWrap:'wrap'}}>
              <span style={{fontSize:14,fontWeight:600,color:C.slate}}>{d.name}</span>
              <span style={{fontSize:22,fontWeight:800,color:C.red,lineHeight:1,letterSpacing:'-0.02em'}}>{d.rate}%</span>
              <span style={{fontSize:12,color:C.muted}}>{d.count} of {d.total} declined · last 30d</span>
            </div>
            <div style={{display:'flex',gap:6,flexShrink:0}}>
              <button style={{padding:'4px 10px',borderRadius:999,border:`1px solid ${C.slate}`,background:C.surface,color:C.slate,fontSize:11,fontWeight:500,cursor:'pointer'}}>Ping in Slack</button>
              <button style={{padding:'4px 10px',borderRadius:999,border:`1px solid ${C.border}`,background:C.surface,color:C.muted,fontSize:11,fontWeight:500,cursor:'pointer'}}>Remove from pool</button>
            </div>
          </div>
          <p style={{margin:'0 0 10px',fontSize:12,color:C.muted,fontStyle:'italic'}}>"{d.note}"</p>
          <div style={{borderTop:`1px solid ${C.clayLight}60`}}>
            <div style={{display:'grid',gridTemplateColumns:'76px 100px 1fr 140px',gap:8,padding:'5px 0 3px',fontSize:10,fontWeight:600,color:C.faint,textTransform:'uppercase',letterSpacing:'0.04em',borderBottom:`1px solid ${C.clayLight}40`}}>
              <span>Date</span><span>Kind</span><span>Candidate</span><span style={{textAlign:'right'}}>Outcome</span>
            </div>
            {d.incidents.map((it,j)=>(
              <div key={j} style={{display:'grid',gridTemplateColumns:'76px 100px 1fr 140px',gap:8,padding:'5px 0',fontSize:12,alignItems:'center',borderBottom:j<d.incidents.length-1?`1px solid ${C.clayLight}30`:'none'}}>
                <span style={{color:C.muted}}>{it.date}</span>
                <span><span style={{fontSize:10,fontWeight:600,padding:'2px 6px',borderRadius:4,background:C.alt,border:`1px solid ${C.borderMed}`,color:C.slate}}>{KIND_NAME[it.kind]}</span></span>
                <span style={{fontWeight:500,color:C.slate}}>{it.cand}</span>
                <span style={{textAlign:'right',color:it.outcome.includes('lost')?C.red:C.muted,fontWeight:it.outcome.includes('lost')?600:400,fontSize:11.5}}>{it.outcome}</span>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Section 6b: Shared queue ───────────────────────────────────────────────
function QueueSection() {
  const {me,partner,stats} = QUEUE;
  return (
    <Card>
      <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:10}}>
        <h3 style={{margin:0,fontSize:13,fontWeight:600,color:C.slate}}>Shared queue · me vs {partner.name}</h3>
        <span style={{fontSize:11,color:C.muted}}>this week</span>
      </div>
      {hr()}
      <div style={{display:'grid',gridTemplateColumns:'1fr 80px 80px',gap:8,marginBottom:4}}>
        <span/>
        <div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:4}}>
          <Avatar initials={me.initials} size={20} kind="recruiter"/>
          <span style={{fontSize:11,color:C.muted}}>me</span>
        </div>
        <div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:4}}>
          <Avatar initials={partner.initials} size={20} kind="sourcer"/>
          <span style={{fontSize:11,color:C.muted}}>{partner.name.split(' ')[0]}</span>
        </div>
      </div>
      {stats.map((s,i)=>{
        const meN  = typeof s.me==='number'?s.me:null;
        const thN  = typeof s.them==='number'?s.them:null;
        const meBetter  = meN!==null&&thN!==null&&(s.lowerBetter?meN<thN:meN>thN);
        const thBetter  = meN!==null&&thN!==null&&(s.lowerBetter?thN<meN:thN>meN);
        const hl = {background:C.oliveBg,borderRadius:4,padding:'1px 4px'};
        return (
          <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 80px 80px',gap:8,alignItems:'center',padding:'5px 0',borderBottom:i<stats.length-1?`1px solid ${C.border}`:'none'}}>
            <span style={{fontSize:12,color:C.slate}}>{s.label}</span>
            <span style={{textAlign:'center',fontSize:18,fontWeight:700,color:meBetter?C.olive:C.slate,...(meBetter?hl:{})}}>{s.me}</span>
            <span style={{textAlign:'center',fontSize:18,fontWeight:700,color:thBetter?C.olive:C.slate,...(thBetter?hl:{})}}>{s.them}</span>
          </div>
        );
      })}
      <p style={{margin:'10px 0 0',fontSize:11,color:C.faint,fontStyle:'italic'}}>Friendly scoreboard · not a leaderboard</p>
    </Card>
  );
}

// ── Section 6c: Module activity ────────────────────────────────────────────
function ModuleSection() {
  return (
    <Card>
      <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:10}}>
        <h3 style={{margin:0,fontSize:13,fontWeight:600,color:C.slate}}>Module activity</h3>
        <span style={{fontSize:11,color:C.muted}}>4-week trend</span>
      </div>
      {hr()}
      <div style={{display:'grid',gridTemplateColumns:'1fr 52px 80px 96px',gap:8,padding:'0 0 4px',fontSize:10,fontWeight:600,color:C.faint,textTransform:'uppercase',letterSpacing:'0.04em',borderBottom:`1px solid ${C.border}`,marginBottom:4}}>
        <span>Module</span><span style={{textAlign:'right'}}>Done/sched</span><span style={{textAlign:'center'}}>4-wk</span><span style={{textAlign:'right'}}>Health</span>
      </div>
      {MODULES.map((m,i)=>{
        const h=HEALTH[m.health];
        return (
          <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 52px 80px 96px',gap:8,alignItems:'center',padding:'6px 0',borderBottom:i<MODULES.length-1?`1px solid ${C.border}`:'none'}}>
            <span style={{fontSize:12,fontWeight:500,color:C.slate,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={m.name}>{m.name}</span>
            <span style={{textAlign:'right',fontSize:12}}><b style={{color:C.slate}}>{m.done}</b><span style={{color:C.muted}}>/{m.sched}</span></span>
            <div style={{display:'flex',justifyContent:'center'}}><Sparkline values={m.trend} color={h.color}/></div>
            <div style={{display:'flex',justifyContent:'flex-end',alignItems:'center',gap:4}}>
              <span style={{width:6,height:6,borderRadius:'50%',background:h.color,flexShrink:0}}/>
              <span style={{fontSize:11,color:h.color,fontWeight:500}}>{h.label}</span>
            </div>
          </div>
        );
      })}
    </Card>
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  const S = {padding:'0 32px',marginBottom:24};
  return (
    <div style={{minHeight:'100vh',background:C.ivory,color:C.slate}}>
      <div style={{maxWidth:1320,margin:'0 auto',paddingBottom:48}}>
        <Header/>
        <div style={{paddingTop:24}}>
          <div style={S}><KPIStrip/></div>
          <div style={S}><DailyFeed/></div>
          <div style={S}><TeamSection/></div>
          <div style={S}><CapacitySection/></div>
          <div style={S}>
            <div style={{display:'grid',gridTemplateColumns:'1.3fr 1fr',gap:16}}>
              <DeclineSection/>
              <div style={{display:'flex',flexDirection:'column',gap:14}}>
                <QueueSection/>
                <ModuleSection/>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
