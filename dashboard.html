function Chip({ children, color = T.muted, bg = 'transparent', xs }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 3,
      padding: xs ? '2px 6px' : '3px 8px',
      borderRadius: 9999,
      border: `1px solid ${color}`,
      background: bg, color,
      fontSize: xs ? 11 : 12, fontWeight: 500,
      lineHeight: 1.2, whiteSpace: 'nowrap',
    }}>{children}</span>
  );
}

function Avatar({ initials, size = 28, kind = 'recruiter' }) {
  const bg    = kind === 'recruiter' ? T.warnBg  : T.oliveBg;
  const color = kind === 'recruiter' ? T.clay    : T.olive;
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      background: bg, border: `1.5px solid ${color}`, color,
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      fontSize: size * 0.38, fontWeight: 700, flexShrink: 0,
    }}>{initials}</div>
  );
}

function Divider() {
  return <div style={{ height: 1, background: T.border, margin: '10px 0' }}/>;
}

function Sparkline({ values, color }) {
  if (!values || values.length < 2) return null;
  const max = Math.max(...values, 1);
  const W = 72, H = 18;
  const pts = values.map((v, i) => {
    const x = (i / (values.length - 1)) * W;
    const y = H - 2 - (v / max) * (H - 4);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return (
    <svg width={W} height={H} style={{ display: 'block', flexShrink: 0 }}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function FeedItem({ item, srcColor }) {
  return (
    <div style={{
      borderRadius: 6, border: `1px solid ${item.urgent ? T.clayLight : T.border}`,
      borderLeft: `3px solid ${item.urgent ? T.clay : srcColor}`,
      background: item.urgent ? T.warnBgLight : T.surface,
      padding: '8px 10px',
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 6 }}>
        <span style={{ fontSize: 12, fontWeight: 600, color: T.slate }}>
          {item.from || item.who}
          {item.type && <span style={{ color: T.muted, fontWeight: 400 }}> · {item.type}</span>}
          {item.tab  && <span style={{ color: T.muted, fontWeight: 400 }}> · {item.tab}</span>}
        </span>
        <span style={{ fontSize: 11, color: T.mutedLight, whiteSpace: 'nowrap', flexShrink: 0 }}>{item.time}</span>
      </div>
      <p style={{ margin: '3px 0 0', fontSize: 12, color: T.slate, lineHeight: 1.4 }}>{item.text}</p>
      {(item.decline || item.afterHours || item.urgent) && (
        <div style={{ display: 'flex', gap: 4, marginTop: 6, flexWrap: 'wrap' }}>
          {item.decline    && <Chip xs color={T.clay}  bg={T.warnBg}    >decline</Chip>}

          {item.urgent     && <Chip xs color={T.clay}  bg={T.warnBg}    >action needed</Chip>}
        </div>
      )}
    </div>
  );
}

function FeedColumn({ src }) {

  return (
    <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 12, padding: 14 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>

            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 11, fontWeight: 700, flexShrink: 0,
          }}>{meta.short}</div>
          <div>
            <div style={{ fontSize: 13, fontWeight: 600, color: T.slate }}>{meta.label}</div>
            <div style={{ fontSize: 11, color: T.mutedLight }}>{meta.sub}</div>
          </div>
        </div>
        {urgentCount > 0 && <Chip xs color={T.clay} bg={T.warnBg}>{urgentCount} urgent</Chip>}
      </div>
      <Divider/>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        {items.map((item, i) => <FeedItem key={i} item={item} srcColor={meta.color}/>)}
      </div>
    </div>
  );
}

          <div style={{ fontSize: 13, fontWeight: 600, color: T.slate }}>{p.name}</div>
          <div style={{ fontSize: 10, color: T.muted, marginTop: 1 }}>{p.kind} · {p.focus}</div>
        </div>
      </div>
      <Divider/>
      {p.candidates.map((c, i) => {
        const [stageColor, stageBg] = STAGE_STYLE[c.stage] || STAGE_STYLE.Outreach;
        return (
          <div key={i} style={{ padding: '5px 0', borderBottom: i < p.candidates.length - 1 ? `1px dashed ${T.border}` : 'none' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 4 }}>
              <span style={{ fontSize: 12, fontWeight: 600, color: T.slate }}>{c.name}</span>
              <span style={{ fontSize: 10, fontWeight: 600, color: stageColor, background: stageBg, padding: '1px 5px', borderRadius: 4 }}>{c.stage}</span>
            </div>
            <div style={{ fontSize: 10, color: T.muted, margin: '2px 0 4px', lineHeight: 1.3 }}>{c.role}</div>
            <div style={{ display: 'flex', gap: 4 }}>
              <Chip xs color={T.clay}  bg={T.warnBg}    >ML</Chip>
              <Chip xs color={T.olive} bg={T.oliveBg}   >GH</Chip>
              <Chip xs color={T.muted} bg={T.surfaceAlt}>IG</Chip>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function TeamCandidates() {
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 12 }}>
        <h2 style={{ margin: 0, fontSize: 15, fontWeight: 600, color: T.slate }}>Team · open candidates</h2>
        <span style={{ fontSize: 11, color: T.mutedLight }}>per candidate: ML profile · GH link · IG = interview guide</span>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 10 }}>
        {TEAM_CANDIDATES.map(p => <PersonCard key={p.name} p={p}/>)}
      </div>
    </div>
  );
}

// ── Section 5: Interviewer capacity ───────────────────────────────────────
function InterviewerCapacity() {
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
          <h2 style={{ margin: 0, fontSize: 15, fontWeight: 600, color: T.slate }}>Interviewer capacity</h2>
          <span style={{ fontSize: 12, color: T.muted }}>this week · what they're doing, not just hours</span>
        </div>
        <KindLegend/>
      </div>
      <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 12, overflow: 'hidden' }}>
        <div style={{
          display: 'grid', gridTemplateColumns: '160px 64px 96px 1fr 80px',
          gap: 12, padding: '8px 16px',
          background: T.surfaceAlt, borderBottom: `1px solid ${T.border}`,
          fontSize: 11, fontWeight: 600, color: T.muted, textTransform: 'uppercase', letterSpacing: '0.03em',
        }}>
          <span>Interviewer</span>
          <span style={{ textAlign: 'right' }}>This wk</span>
          <span style={{ textAlign: 'right' }}>Hrs / cap</span>
          <span>Kind breakdown</span>
          <span style={{ textAlign: 'right' }}>Done/sched</span>
        </div>
        {INTERVIEWERS.map((iv, i) => {
          const over = iv.hours > iv.cap;
          const total = Object.values(iv.kinds).reduce((a, b) => a + b, 0);
          return (
            <div key={iv.name} style={{
              display: 'grid', gridTemplateColumns: '160px 64px 96px 1fr 80px',
              gap: 12, padding: '10px 16px', alignItems: 'center',
              borderBottom: i < INTERVIEWERS.length - 1 ? `1px solid ${T.border}` : 'none',
            }}>
              <span style={{ fontSize: 13, fontWeight: 500, color: T.slate }}>{iv.name}</span>
              <span style={{ textAlign: 'right', fontSize: 16, fontWeight: 700, color: T.slate }}>{total}</span>
              <div style={{ textAlign: 'right' }}>
                <span style={{ fontSize: 15, fontWeight: 700, color: over ? T.red : T.slate }}>{iv.hours}h</span>
                <span style={{ fontSize: 11, color: T.muted }}>/{iv.cap}</span>
                {over && <span style={{ marginLeft: 4, fontSize: 10, color: T.red, fontWeight: 600 }}>over</span>}
              </div>
              <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                {Object.entries(iv.kinds).map(([k, v]) => (
                  <span key={k} style={{
                    display: 'inline-flex', alignItems: 'center', gap: 4,
                    padding: '2px 7px', borderRadius: 4,
                    background: KIND_BG[k], border: `1px solid ${KIND_COLORS[k]}30`,
                    fontSize: 11, color: T.slate, fontWeight: 500,
                  }}>
                    {KIND_LABEL[k]} <b style={{ color: KIND_COLORS[k] }}>{v}</b>
                  </span>
                ))}
              </div>
              <span style={{ textAlign: 'right', fontSize: 12, color: T.muted }}>
                <b style={{ color: T.slate }}>{iv.completed}</b>/{iv.sched}
              </span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Section 6a: Decline offenders ─────────────────────────────────────────
function DeclineOffenders() {
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 12 }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
          <h2 style={{ margin: 0, fontSize: 15, fontWeight: 600, color: T.clay }}>Decline offenders</h2>
          <span style={{ fontSize: 12, color: T.muted }}>interviews you scheduled that they bailed on</span>
        </div>
        <Chip xs color={T.muted} bg={T.surfaceAlt}>last 30d · &gt;25% rate</Chip>
      </div>
      {DECLINE_DETAIL.map((d, i) => (
        <div key={i} style={{
          background: T.warnBgLight, border: `1px solid ${T.clayLight}`,
          borderLeft: `3px solid ${T.clay}`,
          borderRadius: 12, padding: '12px 14px',
          marginBottom: i < DECLINE_DETAIL.length - 1 ? 10 : 0,
        }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8, marginBottom: 4 }}>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, flexWrap: 'wrap' }}>
              <span style={{ fontSize: 14, fontWeight: 600, color: T.slate }}>{d.name}</span>
              <span style={{ fontSize: 22, fontWeight: 800, color: T.red, lineHeight: 1, letterSpacing: '-0.02em' }}>{d.rate}%</span>
              <span style={{ fontSize: 12, color: T.muted }}>{d.count} of {d.total} declined · {d.period}</span>
            </div>
            <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
              <button style={{ padding: '4px 10px', borderRadius: 9999, border: `1px solid ${T.slate}`, background: T.surface, color: T.slate, fontSize: 11, fontWeight: 500, cursor: 'pointer' }}>Ping in Slack</button>
              <button style={{ padding: '4px 10px', borderRadius: 9999, border: `1px solid ${T.border}`, background: T.surface, color: T.muted, fontSize: 11, fontWeight: 500, cursor: 'pointer' }}>Remove from pool</button>
            </div>
          </div>
          <p style={{ margin: '0 0 10px', fontSize: 12, color: T.muted, fontStyle: 'italic' }}>"{d.note}"</p>
          <div style={{ borderTop: `1px solid ${T.clayLight}60` }}>
            <div style={{ display: 'grid', gridTemplateColumns: '76px 100px 1fr 140px', gap: 8, padding: '5px 0 3px', fontSize: 10, fontWeight: 600, color: T.mutedLight, textTransform: 'uppercase', letterSpacing: '0.04em', borderBottom: `1px solid ${T.clayLight}40` }}>
              <span>Date</span><span>Kind</span><span>Candidate</span><span style={{ textAlign: 'right' }}>Outcome</span>
            </div>
            {d.incidents.map((it, j) => (
              <div key={j} style={{ display: 'grid', gridTemplateColumns: '76px 100px 1fr 140px', gap: 8, padding: '5px 0', fontSize: 12, borderBottom: j < d.incidents.length - 1 ? `1px solid ${T.clayLight}30` : 'none', alignItems: 'center' }}>
                <span style={{ color: T.muted }}>{it.date}</span>
                <span><span style={{ fontSize: 10, fontWeight: 600, padding: '2px 6px', borderRadius: 4, background: T.surfaceAlt, border: `1px solid ${T.borderMed}`, color: T.slate }}>{KIND_LABEL[it.kind]}</span></span>
                <span style={{ fontWeight: 500, color: T.slate }}>{it.cand}</span>
                <span style={{ textAlign: 'right', color: it.outcome.includes('lost') ? T.red : T.muted, fontWeight: it.outcome.includes('lost') ? 600 : 400, fontSize: 11.5 }}>{it.outcome}</span>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Section 6b: Shared queue ───────────────────────────────────────────────
function SharedQueue() {
  const { me, partner, period, stats } = SHARED_QUEUE;
  return (
    <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 12, padding: 14 }}>
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 10 }}>
        <h3 style={{ margin: 0, fontSize: 13, fontWeight: 600, color: T.slate }}>Shared queue · me vs {partner.name}</h3>
        <span style={{ fontSize: 11, color: T.muted }}>{period}</span>
      </div>
      <Divider/>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 80px 80px', gap: 8, marginBottom: 4 }}>
        <span/>
        <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', gap: 4 }}>
          <Avatar initials={me.initials} size={20} kind="recruiter"/>
          <span style={{ fontSize: 11, color: T.muted }}>me</span>
        </div>
        <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', gap: 4 }}>
          <Avatar initials={partner.initials} size={20} kind="sourcer"/>
          <span style={{ fontSize: 11, color: T.muted }}>{partner.name.split(' ')[0]}</span>
        </div>
      </div>
      {stats.map((s, i) => {
        const meNum = typeof s.me === 'number' ? s.me : null;
        const thNum = typeof s.them === 'number' ? s.them : null;
        const meBetter  = meNum !== null && thNum !== null && (s.lowerBetter ? meNum < thNum : meNum > thNum);
        const thBetter  = meNum !== null && thNum !== null && (s.lowerBetter ? thNum < meNum : thNum > meNum);
        return (
          <div key={i} style={{ display: 'grid', gridTemplateColumns: '1fr 80px 80px', gap: 8, alignItems: 'center', padding: '5px 0', borderBottom: i < stats.length - 1 ? `1px solid ${T.border}` : 'none' }}>
            <span style={{ fontSize: 12, color: T.slate }}>{s.k}</span>
            <span style={{ textAlign: 'center', fontSize: 18, fontWeight: 700, color: meBetter ? T.olive : T.slate, background: meBetter ? T.oliveBg : 'transparent', borderRadius: 4, padding: meBetter ? '1px 4px' : 0 }}>{s.me}</span>
            <span style={{ textAlign: 'center', fontSize: 18, fontWeight: 700, color: thBetter ? T.olive : T.slate, background: thBetter ? T.oliveBg : 'transparent', borderRadius: 4, padding: thBetter ? '1px 4px' : 0 }}>{s.them}</span>
          </div>
        );
      })}
      <p style={{ margin: '10px 0 0', fontSize: 11, color: T.mutedLight, fontStyle: 'italic' }}>Friendly scoreboard · not a leaderboard</p>
    </div>
  );
}

// ── Section 6c: Module activity ────────────────────────────────────────────
function ModuleActivity() {
  return (
    <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 12, padding: 14 }}>
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 10 }}>
        <h3 style={{ margin: 0, fontSize: 13, fontWeight: 600, color: T.slate }}>Module activity</h3>
        <span style={{ fontSize: 11, color: T.muted }}>4-week trend</span>
      </div>
      <Divider/>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 52px 80px 90px', gap: 8, padding: '0 0 4px', fontSize: 10, fontWeight: 600, color: T.mutedLight, textTransform: 'uppercase', letterSpacing: '0.04em', borderBottom: `1px solid ${T.border}`, marginBottom: 4 }}>
        <span>Module</span><span style={{ textAlign: 'right' }}>Done/sched</span><span style={{ textAlign: 'center' }}>4-wk</span><span style={{ textAlign: 'right' }}>Health</span>
      </div>
      {ML_MODULES.map((m, i) => {
        const h = HEALTH[m.health];
        return (
          <div key={i} style={{ display: 'grid', gridTemplateColumns: '1fr 52px 80px 90px', gap: 8, alignItems: 'center', padding: '6px 0', borderBottom: i < ML_MODULES.length - 1 ? `1px solid ${T.border}` : 'none' }}>
            <span style={{ fontSize: 12, fontWeight: 500, color: T.slate, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={m.name}>{m.name}</span>
            <span style={{ textAlign: 'right', fontSize: 12 }}><b style={{ color: T.slate }}>{m.done}</b><span style={{ color: T.muted }}>/{m.sched}</span></span>
            <div style={{ display: 'flex', justifyContent: 'center' }}><Sparkline values={m.trend} color={h.color}/></div>
            <div style={{ display: 'flex', justifyContent: 'flex-end', alignItems: 'center', gap: 4 }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: h.color, flexShrink: 0 }}/>
              <span style={{ fontSize: 11, color: h.color, fontWeight: 500 }}>{h.label}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Root app ───────────────────────────────────────────────────────────────
function App() {
  return (
    <div style={{ minHeight: '100vh', background: T.ivory, color: T.slate }}>
      <div style={{ maxWidth: 1320, margin: '0 auto', paddingBottom: 48 }}>
        <Header/>
        <div style={{ paddingTop: 24 }}>
          <div style={{ padding: '0 32px', marginBottom: 24 }}><KPIStrip/></div>
          <div style={{ padding: '0 32px', marginBottom: 24 }}><DailyFeed/></div>
          <div style={{ padding: '0 32px', marginBottom: 24 }}><TeamCandidates/></div>
          <div style={{ padding: '0 32px', marginBottom: 24 }}><InterviewerCapacity/></div>
          <div style={{ padding: '0 32px' }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1.3fr 1fr', gap: 16 }}>
              <DeclineOffenders/>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                <SharedQueue/>
                <ModuleActivity/>
              </div>
            </div>

      </div>

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
